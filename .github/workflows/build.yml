name: Build Desktop Pet EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller -F -w --add-data "pet.png;." desktop_pet.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPetEXE
          path: dist/*.exe
